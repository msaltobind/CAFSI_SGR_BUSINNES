name: Bot Automatizador CAFCI

on:
  schedule:
    # 13:00 UTC equivale exactamente a las 10:00 AM hora Argentina.
    # Corre de lunes (1) a viernes (5).
    - cron: '0 13 * * 1-5'
  workflow_dispatch: # Botón de ejecución manual

permissions:
  contents: write

jobs:
  descargar-y-procesar:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Clonar el repositorio
        uses: actions/checkout@v3

      - name: 2. Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 3. Instalar Librerías
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl requests

      - name: 4. Correr el Script ETL
        run: python scraper.py

      - name: 5. Guardar los nuevos datos
        run: |
          git config --global user.name "Bot-Tesorería-BIND"
          git config --global user.email "bot@bind.com.ar"
          git add docs/data.json
          git commit -m "Actualización diaria" || echo "Sin cambios"
          git push

      - name: 6. Enviar Correo de Confirmación a Tesorería
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          # Credenciales del correo REMITENTE (Guardadas en GitHub Secrets)
          username: ${{ secrets.EMAIL_BOT_USER }}
          password: ${{ secrets.EMAIL_BOT_PASS }}
          subject: "✅ Dashboard CAFCI Actualizado Exitosamente"
          to: msalto@bancoindustrial.com.ar
          from: "Bot CAFCI Intelligence"
          body: |
            Hola equipo,
            
            El proceso de actualización de las 10:00 AM ha finalizado correctamente.
            El nuevo archivo de CAFCI fue descargado e inyectado en el Dashboard.
            
            Puedes visualizarlo aquí: https://msaltobind.github.io/CAFSI_SGR_BUSINNES/